<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px;
    line-height: 1.8;
    color: #333;
    background: #fff;
  }
  h1 { font-size: 1.6em; margin: 0 0 8px 0; font-weight: 700; }
  h2 { font-size: 1.3em; margin: 32px 0 12px 0; font-weight: 600; border-bottom: 1px solid #eee; padding-bottom: 6px; }
  h3 { font-size: 1.1em; margin: 20px 0 8px 0; font-weight: 600; }
  p { margin: 0 0 12px 0; }
  img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 16px 0;
    border-radius: 4px;
  }
  .meta { color: #999; font-size: 0.9em; margin-bottom: 24px; }
  .photo-caption { color: #888; font-size: 0.85em; text-align: center; margin-top: -12px; margin-bottom: 16px; }
  blockquote { border-left: 3px solid #ddd; padding-left: 12px; color: #666; margin: 12px 0; }
  a { color: #1a73e8; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
{{CONTENT}}
</body>
</html>
